version: "3.9"
# ─────────────────────────────────────────────
#  FFmpeg Cluster
#  - nginx      → Load Balancer      :9001
#  - api_1/2    → FastAPI Instanzen  (intern :8000)
#  - worker_1/2 → FFmpeg Worker      (intern, MAX_JOBS=1)
#  - redis      → Job Queue          (intern)
# ─────────────────────────────────────────────

services:

  # ── Redis (Queue + Status-Store) ──────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256m
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── API Instanzen ─────────────────────────────
  api_1:
    build: ./api
    restart: unless-stopped
    environment:
      - REDIS_HOST=redis
      - API_KEY=${API_KEY}
    volumes:
      - shared_files:/shared
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512m
    depends_on:
      redis:
        condition: service_healthy

  api_2:
    build: ./api
    restart: unless-stopped
    environment:
      - REDIS_HOST=redis
      - API_KEY=${API_KEY}
    volumes:
      - shared_files:/shared
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512m
    depends_on:
      redis:
        condition: service_healthy

  # ── FFmpeg Worker ─────────────────────────────
  worker_1:
    build: ./worker
    restart: unless-stopped
    environment:
      - REDIS_HOST=redis
      - MAX_JOBS=1           # 1 Job pro Worker → max 2 gleichzeitige Konvertierungen
      - JOB_TIMEOUT=1800     # 30 Minuten Timeout
      - FILE_TTL_SECONDS=3600
    volumes:
      - shared_files:/shared
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 2g
    depends_on:
      redis:
        condition: service_healthy

  worker_2:
    build: ./worker
    restart: unless-stopped
    environment:
      - REDIS_HOST=redis
      - MAX_JOBS=1
      - JOB_TIMEOUT=1800
      - FILE_TTL_SECONDS=3600
    volumes:
      - shared_files:/shared
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 2g
    depends_on:
      redis:
        condition: service_healthy

  # ── Nginx Load Balancer ───────────────────────
  nginx:
    build: ./nginx
    restart: unless-stopped
    ports:
      - "9001:80"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256m
    depends_on:
      - api_1
      - api_2

volumes:
  redis_data:
  shared_files:    # API + Worker teilen sich diesen Volume für Upload/Output-Dateien
