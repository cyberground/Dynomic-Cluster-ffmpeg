version: "3.9"

# ─────────────────────────────────────────────
#  FFmpeg Cluster
#  - nginx      → Load Balancer      :9001
#  - api_1/2/3  → FastAPI Instanzen  (intern)
#  - worker_1/2 → FFmpeg Worker      (intern)
#  - redis      → Job Queue          (intern)
# ─────────────────────────────────────────────

services:

  # ── Redis (Queue + Status-Store) ──────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── API Instanzen ─────────────────────────────
  api_1:
    build: ./api
    restart: unless-stopped
    environment:
      - REDIS_HOST=redis
    volumes:
      - shared_files:/shared
    depends_on:
      redis:
        condition: service_healthy

  api_2:
    build: ./api
    restart: unless-stopped
    environment:
      - REDIS_HOST=redis
    volumes:
      - shared_files:/shared
    depends_on:
      redis:
        condition: service_healthy

  api_3:
    build: ./api
    restart: unless-stopped
    environment:
      - REDIS_HOST=redis
    volumes:
      - shared_files:/shared
    depends_on:
      redis:
        condition: service_healthy

  # ── FFmpeg Worker ─────────────────────────────
  worker_1:
    build: ./worker
    restart: unless-stopped
    environment:
      - REDIS_HOST=redis
      - MAX_JOBS=2          # 2 gleichzeitige Konvertierungen pro Worker
    volumes:
      - shared_files:/shared
    depends_on:
      redis:
        condition: service_healthy

  worker_2:
    build: ./worker
    restart: unless-stopped
    environment:
      - REDIS_HOST=redis
      - MAX_JOBS=2
    volumes:
      - shared_files:/shared
    depends_on:
      redis:
        condition: service_healthy

  # ── Nginx Load Balancer ───────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "9001:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api_1
      - api_2
      - api_3

volumes:
  redis_data:
  shared_files:    # API + Worker teilen sich diesen Volume für Upload/Output-Dateien
