upstream ffmpeg_api {
    server api_1:8000 max_fails=3 fail_timeout=30s;
    server api_2:8000 max_fails=3 fail_timeout=30s;
    keepalive 64;
}

server {
    listen 80;

    # Große Uploads erlauben
    client_max_body_size 2G;

    # WICHTIG: Upload darf lange dauern
    client_body_timeout 1800s;

    # WICHTIG: Lange Verarbeitung erlauben (30 Minuten)
    proxy_read_timeout 1800s;
    proxy_send_timeout 1800s;

    # Stabilere Proxy Settings
    proxy_connect_timeout 300s;

    # Verhindert Buffer-Probleme bei großen Streams
    proxy_request_buffering off;
    proxy_buffering off;

    location / {
        proxy_pass http://ffmpeg_api;

        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Wichtig bei Streaming APIs
        chunked_transfer_encoding on;
    }
}
